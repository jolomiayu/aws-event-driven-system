AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Resources:

  # DLQ
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: dlq-queue

  # Main Queue
  MainQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: main-queue
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
        maxReceiveCount: 2

  # DynamoDB Table
  MessageTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Messages
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  # Producer Lambda
  ProducerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/producer.lambda_handler
      Runtime: python3.9
      CodeUri: .
      Policies:
        - SQSSendMessagePolicy:
            QueueName: main-queue
      Environment:
        Variables:
          QUEUE_URL: !Ref MainQueue
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /send
            Method: post

  # Consumer Lambda
  ConsumerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/consumer.lambda_handler
      Runtime: python3.9
      CodeUri: .
      Policies:
        - SQSPollerPolicy:
            QueueName: main-queue
        - DynamoDBCrudPolicy:
            TableName: Messages
      Environment:
        Variables:
          TABLE_NAME: Messages
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt MainQueue.Arn
            BatchSize: 1
